<!DOCTYPE html>
<html>
<head>
  <title>GitHub Sync</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <h3>GitHub Sync Setup</h3>

  <input id="token" type="password" placeholder="GitHub Token" />
  <input id="username" type="text" placeholder="GitHub Username" />
  <input id="repo" type="text" placeholder="Repository Name" />

  <button id="save">💾 Save</button>
  <button id="test">🔗 Test Connection</button>

  <div id="status" class="status"></div>

  <script src="popup.js"></script>
</body>
</html>
